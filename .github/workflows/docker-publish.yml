name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

# 最佳实践：并发控制。防止同分支/PR的多次提交同时跑，自动取消旧的运行，节省资源。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 最佳实践：最小权限原则。限制运行权限，防范供应链安全风险。
permissions:
  contents: read

jobs:
  # 1. CI 阶段：验证代码质量
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy Go modules
        run: go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      # 最佳实践：上传测试覆盖率报告到 GitHub Actions Artifacts
      - name: Upload coverage reports to Action Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage-report
          path: coverage.txt
          retention-days: 7

  # 2. CD 阶段：构建并推送 Docker 镜像
  build-and-push:
    name: Build and Push Docker Image
    needs: ci
    # CD 仅在发布 GitHub Release 时执行
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ github.repository_owner }}/redis-del-vs-unlink
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 最佳实践：多平台镜像构建。同时编译并发布 amd64 与 arm64 架构镜像，增强兼容性。
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
